<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#38bdf8" opacity="0.8"/>
    </marker>
    <marker id="arrow-muted" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="700" letter-spacing="-0.02em">intu<tspan fill="#38bdf8">.dev</tspan> Architecture</text>

  <!-- === INTU CLI BAR === -->
  <rect x="120" y="56" width="720" height="44" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="140" y="83" fill="#38bdf8" font-size="13" font-weight="700">intu CLI</text>
  <text x="230" y="83" fill="#94a3b8" font-size="10.5" font-family="'SF Mono', 'Fira Code', monospace">init</text>
  <text x="270" y="83" fill="#94a3b8" font-size="10.5" font-family="'SF Mono', 'Fira Code', monospace">serve</text>
  <text x="318" y="83" fill="#94a3b8" font-size="10.5" font-family="'SF Mono', 'Fira Code', monospace">validate</text>
  <text x="380" y="83" fill="#94a3b8" font-size="10.5" font-family="'SF Mono', 'Fira Code', monospace">build</text>
  <text x="425" y="83" fill="#94a3b8" font-size="10.5" font-family="'SF Mono', 'Fira Code', monospace">channel</text>
  <text x="490" y="83" fill="#94a3b8" font-size="10.5" font-family="'SF Mono', 'Fira Code', monospace">deploy</text>
  <text x="545" y="83" fill="#94a3b8" font-size="10.5" font-family="'SF Mono', 'Fira Code', monospace">stats</text>
  <text x="590" y="83" fill="#94a3b8" font-size="10.5" font-family="'SF Mono', 'Fira Code', monospace">message</text>
  <text x="655" y="83" fill="#94a3b8" font-size="10.5" font-family="'SF Mono', 'Fira Code', monospace">dashboard</text>
  <text x="733" y="83" fill="#94a3b8" font-size="10.5" font-family="'SF Mono', 'Fira Code', monospace">prune</text>

  <!-- Arrow from CLI to Runtime -->
  <line x1="480" y1="100" x2="480" y2="118" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow-muted)"/>

  <!-- === INTU RUNTIME ENGINE === -->
  <rect x="120" y="120" width="720" height="340" rx="14" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="132" y="112" width="156" height="20" rx="4" fill="#0f172a"/>
  <text x="140" y="127" fill="#f8fafc" font-size="12" font-weight="700">intu Runtime Engine</text>
  <text x="290" y="127" fill="#475569" font-size="10">(Go binary + Node.js workers)</text>

  <!-- === LEFT: EXTERNAL SOURCES === -->
  <rect x="16" y="218" width="88" height="140" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="60" y="244" text-anchor="middle" fill="#f8fafc" font-size="10" font-weight="600">Healthcare</text>
  <text x="60" y="258" text-anchor="middle" fill="#f8fafc" font-size="10" font-weight="600">Systems</text>
  <text x="60" y="282" text-anchor="middle" fill="#64748b" font-size="9">EHR</text>
  <text x="60" y="296" text-anchor="middle" fill="#64748b" font-size="9">Lab / LIS</text>
  <text x="60" y="310" text-anchor="middle" fill="#64748b" font-size="9">Pharmacy</text>
  <text x="60" y="324" text-anchor="middle" fill="#64748b" font-size="9">Imaging</text>
  <text x="60" y="338" text-anchor="middle" fill="#64748b" font-size="9">Payer</text>

  <!-- Arrow: External → Sources -->
  <line x1="104" y1="288" x2="134" y2="288" stroke="#38bdf8" stroke-width="1.5" opacity="0.6" marker-end="url(#arrow)"/>

  <!-- === SOURCE CONNECTORS === -->
  <rect x="140" y="160" width="130" height="256" rx="12" fill="#0f2818" stroke="#22c55e" stroke-width="1" opacity="0.9"/>
  <text x="205" y="184" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700">Sources</text>
  <rect x="152" y="196" width="106" height="22" rx="5" fill="#14532d" opacity="0.7"/>
  <text x="205" y="211" text-anchor="middle" fill="#86efac" font-size="9">HTTP / REST</text>
  <rect x="152" y="224" width="106" height="22" rx="5" fill="#14532d" opacity="0.7"/>
  <text x="205" y="239" text-anchor="middle" fill="#86efac" font-size="9">TCP / MLLP</text>
  <rect x="152" y="252" width="106" height="22" rx="5" fill="#14532d" opacity="0.7"/>
  <text x="205" y="267" text-anchor="middle" fill="#86efac" font-size="9">FHIR R4</text>
  <rect x="152" y="280" width="106" height="22" rx="5" fill="#14532d" opacity="0.7"/>
  <text x="205" y="295" text-anchor="middle" fill="#86efac" font-size="9">Kafka</text>
  <rect x="152" y="308" width="106" height="22" rx="5" fill="#14532d" opacity="0.7"/>
  <text x="205" y="323" text-anchor="middle" fill="#86efac" font-size="9">Database</text>
  <rect x="152" y="336" width="106" height="22" rx="5" fill="#14532d" opacity="0.7"/>
  <text x="205" y="351" text-anchor="middle" fill="#86efac" font-size="9">File / SFTP</text>
  <rect x="152" y="364" width="106" height="22" rx="5" fill="#14532d" opacity="0.7"/>
  <text x="205" y="379" text-anchor="middle" fill="#86efac" font-size="9">DICOM / IHE</text>
  <rect x="152" y="392" width="106" height="22" rx="5" fill="#14532d" opacity="0.7"/>
  <text x="205" y="407" text-anchor="middle" fill="#86efac" font-size="9">Email / SOAP</text>

  <!-- Arrow: Sources → Pipeline -->
  <line x1="270" y1="288" x2="300" y2="288" stroke="#38bdf8" stroke-width="1.5" opacity="0.6" marker-end="url(#arrow)"/>

  <!-- === PIPELINE (center) === -->
  <rect x="306" y="160" width="290" height="256" rx="12" fill="#0c1425" stroke="#38bdf8" stroke-width="1" opacity="0.9"/>
  <text x="451" y="184" text-anchor="middle" fill="#38bdf8" font-size="11" font-weight="700">Channel Pipeline</text>

  <!-- Pipeline stages -->
  <rect x="322" y="200" width="258" height="32" rx="7" fill="#1e293b" stroke="#475569" stroke-width="0.75"/>
  <text x="451" y="220" text-anchor="middle" fill="#94a3b8" font-size="10">Preprocessor</text>

  <line x1="451" y1="232" x2="451" y2="242" stroke="#38bdf8" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>

  <rect x="322" y="246" width="258" height="32" rx="7" fill="#1a0a2e" stroke="#a78bfa" stroke-width="1"/>
  <text x="451" y="266" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Validator</text>
  <text x="560" y="266" fill="#7c3aed" font-size="8" font-family="'SF Mono', 'Fira Code', monospace">validator.ts</text>

  <line x1="451" y1="278" x2="451" y2="288" stroke="#38bdf8" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>

  <rect x="322" y="292" width="258" height="32" rx="7" fill="#0c1a3d" stroke="#38bdf8" stroke-width="1"/>
  <text x="451" y="312" text-anchor="middle" fill="#7dd3fc" font-size="10" font-weight="600">Transformer</text>
  <text x="567" y="312" fill="#0369a1" font-size="8" font-family="'SF Mono', 'Fira Code', monospace">transformer.ts</text>

  <line x1="451" y1="324" x2="451" y2="334" stroke="#38bdf8" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>

  <rect x="322" y="338" width="258" height="32" rx="7" fill="#1e293b" stroke="#475569" stroke-width="0.75"/>
  <text x="451" y="358" text-anchor="middle" fill="#94a3b8" font-size="10">Destination Filter / Transformer</text>

  <line x1="451" y1="370" x2="451" y2="380" stroke="#38bdf8" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>

  <rect x="322" y="384" width="258" height="32" rx="7" fill="#1e293b" stroke="#475569" stroke-width="0.75"/>
  <text x="451" y="404" text-anchor="middle" fill="#94a3b8" font-size="10">Postprocessor</text>

  <!-- Arrow: Pipeline → Destinations -->
  <line x1="596" y1="288" x2="616" y2="288" stroke="#38bdf8" stroke-width="1.5" opacity="0.6" marker-end="url(#arrow)"/>

  <!-- === DESTINATION CONNECTORS === -->
  <rect x="622" y="160" width="130" height="256" rx="12" fill="#1a0f04" stroke="#f59e0b" stroke-width="1" opacity="0.9"/>
  <text x="687" y="184" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">Destinations</text>
  <rect x="634" y="196" width="106" height="22" rx="5" fill="#422006" opacity="0.7"/>
  <text x="687" y="211" text-anchor="middle" fill="#fde68a" font-size="9">HTTP / REST</text>
  <rect x="634" y="224" width="106" height="22" rx="5" fill="#422006" opacity="0.7"/>
  <text x="687" y="239" text-anchor="middle" fill="#fde68a" font-size="9">TCP / MLLP</text>
  <rect x="634" y="252" width="106" height="22" rx="5" fill="#422006" opacity="0.7"/>
  <text x="687" y="267" text-anchor="middle" fill="#fde68a" font-size="9">FHIR R4</text>
  <rect x="634" y="280" width="106" height="22" rx="5" fill="#422006" opacity="0.7"/>
  <text x="687" y="295" text-anchor="middle" fill="#fde68a" font-size="9">Kafka</text>
  <rect x="634" y="308" width="106" height="22" rx="5" fill="#422006" opacity="0.7"/>
  <text x="687" y="323" text-anchor="middle" fill="#fde68a" font-size="9">Database</text>
  <rect x="634" y="336" width="106" height="22" rx="5" fill="#422006" opacity="0.7"/>
  <text x="687" y="351" text-anchor="middle" fill="#fde68a" font-size="9">File / SFTP</text>
  <rect x="634" y="364" width="106" height="22" rx="5" fill="#422006" opacity="0.7"/>
  <text x="687" y="379" text-anchor="middle" fill="#fde68a" font-size="9">DICOM / SMTP</text>
  <rect x="634" y="392" width="106" height="22" rx="5" fill="#422006" opacity="0.7"/>
  <text x="687" y="407" text-anchor="middle" fill="#fde68a" font-size="9">JMS / Direct / Log</text>

  <!-- Arrow: Destinations → External -->
  <line x1="752" y1="288" x2="782" y2="288" stroke="#38bdf8" stroke-width="1.5" opacity="0.6" marker-end="url(#arrow)"/>

  <!-- === RIGHT: EXTERNAL DESTINATIONS === -->
  <rect x="788" y="218" width="88" height="140" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="832" y="244" text-anchor="middle" fill="#f8fafc" font-size="10" font-weight="600">Healthcare</text>
  <text x="832" y="258" text-anchor="middle" fill="#f8fafc" font-size="10" font-weight="600">Systems</text>
  <text x="832" y="282" text-anchor="middle" fill="#64748b" font-size="9">EHR</text>
  <text x="832" y="296" text-anchor="middle" fill="#64748b" font-size="9">HIE</text>
  <text x="832" y="310" text-anchor="middle" fill="#64748b" font-size="9">FHIR Server</text>
  <text x="832" y="324" text-anchor="middle" fill="#64748b" font-size="9">Data Lake</text>
  <text x="832" y="338" text-anchor="middle" fill="#64748b" font-size="9">Archive</text>

  <!-- === BOTTOM ROW: Supporting services === -->

  <!-- Dashboard -->
  <rect x="140" y="432" width="145" height="44" rx="9" fill="#1e293b" stroke="#e879f9" stroke-width="1"/>
  <text x="212" y="449" text-anchor="middle" fill="#e879f9" font-size="10" font-weight="700">Web Dashboard</text>
  <text x="212" y="465" text-anchor="middle" fill="#64748b" font-size="9">:3000 · Channels · Messages</text>

  <!-- Hot Reload -->
  <rect x="300" y="432" width="145" height="44" rx="9" fill="#1e293b" stroke="#38bdf8" stroke-width="1"/>
  <text x="372" y="449" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="700">Hot Reload</text>
  <text x="372" y="465" text-anchor="middle" fill="#64748b" font-size="9">fsnotify · YAML · TS</text>

  <!-- Message Store -->
  <rect x="460" y="432" width="145" height="44" rx="9" fill="#1e293b" stroke="#34d399" stroke-width="1"/>
  <text x="532" y="449" text-anchor="middle" fill="#34d399" font-size="10" font-weight="700">Message Store</text>
  <text x="532" y="465" text-anchor="middle" fill="#64748b" font-size="9">Memory · Postgres · S3</text>

  <!-- Node.js Workers -->
  <rect x="620" y="432" width="145" height="44" rx="9" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="692" y="449" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">Node.js Workers</text>
  <text x="692" y="465" text-anchor="middle" fill="#64748b" font-size="9">TS execution · Worker pool</text>

  <!-- === BOTTOM: Config layer === -->
  <rect x="140" y="492" width="150" height="34" rx="7" fill="#0f172a" stroke="#475569" stroke-width="0.75"/>
  <text x="215" y="513" text-anchor="middle" fill="#64748b" font-size="9" font-family="'SF Mono', 'Fira Code', monospace">channel.yaml</text>

  <rect x="306" y="492" width="150" height="34" rx="7" fill="#0f172a" stroke="#475569" stroke-width="0.75"/>
  <text x="381" y="513" text-anchor="middle" fill="#64748b" font-size="9" font-family="'SF Mono', 'Fira Code', monospace">transformer.ts</text>

  <rect x="472" y="492" width="150" height="34" rx="7" fill="#0f172a" stroke="#475569" stroke-width="0.75"/>
  <text x="547" y="513" text-anchor="middle" fill="#64748b" font-size="9" font-family="'SF Mono', 'Fira Code', monospace">intu.yaml</text>

  <rect x="638" y="492" width="150" height="34" rx="7" fill="#0f172a" stroke="#475569" stroke-width="0.75"/>
  <text x="713" y="513" text-anchor="middle" fill="#64748b" font-size="9" font-family="'SF Mono', 'Fira Code', monospace">.env · profiles</text>

  <!-- Git label -->
  <text x="480" y="537" text-anchor="middle" fill="#475569" font-size="9">All config stored in Git — version-controlled, reviewable, AI-friendly</text>
</svg>
