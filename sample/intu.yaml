runtime:
  name: intu
  profile: dev
  log_level: info
  storage:
    driver: memory
    postgres_dsn: ${INTU_POSTGRES_DSN}

channels_dir: channels

destinations:
  kafka-output:
    type: kafka
    kafka:
      brokers:
        - ${INTU_KAFKA_BROKER}
      topic: output-topic

kafka:
  brokers:
    - ${INTU_KAFKA_BROKER}
